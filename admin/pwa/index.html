<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Dune HD Remote</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="app">

  <!-- ── TAB: MAIN ──────────────────────────────────────────────────────── -->
  <div id="tab-main" class="tab-content active">

    <!-- INFO / POWER / POP UP row -->
    <div class="row">
      <button id="btn-info"  class="btn" style="flex:1">INFO</button>
      <button id="btn-power" class="btn power" style="flex:1" title="Power">
        <svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42A6.92 6.92 0 0 1 19 12c0 3.87-3.13 7-7 7A7 7 0 0 1 5 12c0-2.28 1.09-4.3 2.58-5.42L6.17 5.17A8.932 8.932 0 0 0 3 12a9 9 0 0 0 18 0c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
      </button>
      <button id="btn-popup" class="btn" style="flex:1;font-size:11px">POP UP<br>MENU</button>
    </div>

    <!-- D-pad -->
    <div id="dpad">
      <div class="empty"></div>
      <button id="btn-up"    class="btn nav">▲</button>
      <div class="empty"></div>
      <button id="btn-left"  class="btn nav">◀</button>
      <button id="btn-enter" class="btn center">ENTER</button>
      <button id="btn-right" class="btn nav">▶</button>
      <div class="empty"></div>
      <button id="btn-down"  class="btn nav">▼</button>
      <div class="empty"></div>
    </div>

    <!-- RETURN / TOP MENU row -->
    <div class="row">
      <button id="btn-return"  class="btn" style="flex:1">RETURN</button>
      <div style="flex:2"></div>
      <button id="btn-topmenu" class="btn" style="flex:1;font-size:11px">TOP<br>MENU</button>
    </div>

    <!-- Playback row 1: Play / Pause / |<< / >>| -->
    <div class="row">
      <button id="btn-play"  class="btn play">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button id="btn-pause" class="btn play">
        <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button id="btn-prev"  class="btn play">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="btn-next"  class="btn play">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.9V8.1L8.5 12zM16 6h2v12h-2z"/></svg>
      </button>
    </div>

    <!-- Playback row 2: Stop / Slow / REW / FF -->
    <div class="row">
      <button id="btn-stop"  class="btn play">
        <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
      </button>
      <button id="btn-slow"  class="btn play" style="font-size:11px">▶|</button>
      <button id="btn-rew"   class="btn play">
        <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6 8.5 6V6l-8.5 6z"/></svg>
      </button>
      <button id="btn-ff"    class="btn play">
        <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
      </button>
    </div>

    <!-- Volume / Mute / Audio row -->
    <div class="row">
      <button id="btn-vol-down" class="btn" style="flex:1">
        <svg viewBox="0 0 24 24"><path d="M18.5 12A4.5 4.5 0 0 0 16 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>
      </button>
      <button id="btn-vol-up" class="btn" style="flex:1">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
      <button id="btn-mute"  class="btn" style="flex:1" title="Mute">
        <svg viewBox="0 0 24 24"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97V10.18l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 18l1.73 1.73L21 18.46 5.54 3 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </button>
      <button id="btn-audio" class="btn" style="flex:1;font-size:12px">AUDIO</button>
    </div>

  </div><!-- /tab-main -->

  <!-- ── TAB: DIGITS + OTHER ────────────────────────────────────────────── -->
  <div id="tab-digits" class="tab-content">

    <!-- Color buttons A/B/C/D -->
    <div class="row">
      <button id="btn-a" class="btn col-a">A</button>
      <button id="btn-b" class="btn col-b">B</button>
      <button id="btn-c" class="btn col-c">C</button>
      <button id="btn-d" class="btn col-d">D</button>
    </div>

    <!-- Digits grid -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <button id="btn-1" class="btn digit-btn"><span class="digit-num">1</span><span class="digit-sub">.:/ </span></button>
      <button id="btn-2" class="btn digit-btn"><span class="digit-num">2</span><span class="digit-sub">abc</span></button>
      <button id="btn-3" class="btn digit-btn"><span class="digit-num">3</span><span class="digit-sub">def</span></button>
      <button id="btn-4" class="btn digit-btn"><span class="digit-num">4</span><span class="digit-sub">ghi</span></button>
      <button id="btn-5" class="btn digit-btn"><span class="digit-num">5</span><span class="digit-sub">jkl</span></button>
      <button id="btn-6" class="btn digit-btn"><span class="digit-num">6</span><span class="digit-sub">mno</span></button>
      <button id="btn-7" class="btn digit-btn"><span class="digit-num">7</span><span class="digit-sub">pqrs</span></button>
      <button id="btn-8" class="btn digit-btn"><span class="digit-num">8</span><span class="digit-sub">tuv</span></button>
      <button id="btn-9" class="btn digit-btn"><span class="digit-num">9</span><span class="digit-sub">wxyz</span></button>
      <button id="btn-clear"  class="btn digit-btn"><span class="digit-num" style="font-size:14px">CLEAR</span><span class="digit-sub">←</span></button>
      <button id="btn-0"      class="btn digit-btn"><span class="digit-num">0</span><span class="digit-sub">_</span></button>
      <button id="btn-select" class="btn digit-btn"><span class="digit-num" style="font-size:12px">SELECT</span><span class="digit-sub">cap/num</span></button>
    </div>

    <!-- Other buttons -->
    <div class="row">
      <button id="btn-subtitle" class="btn" style="flex:1">SUBTITLE</button>
      <button id="btn-zoom"     class="btn" style="flex:1">ZOOM</button>
      <button id="btn-angle"    class="btn" style="flex:1">ANGLE</button>
    </div>
    <div class="row">
      <button id="btn-repeat" class="btn" style="flex:1">REPEAT</button>
      <button id="btn-eject"  class="btn" style="flex:1">EJECT</button>
    </div>
    <div class="row">
      <button id="btn-return2" class="btn nav" style="flex:1">RETURN</button>
      <button id="btn-enter2"  class="btn nav" style="flex:1">ENTER</button>
    </div>

  </div><!-- /tab-digits -->

  <!-- ── TAB: SETTINGS ──────────────────────────────────────────────────── -->
  <div id="tab-settings" class="tab-content">

    <div class="settings-group">
      <div style="font-size:13px;font-weight:600;margin-bottom:4px">Appearance</div>
      <div class="theme-toggle">
        <span>Dark</span>
        <label class="toggle-switch">
          <input type="checkbox" id="themeToggle"/>
          <span class="toggle-slider"></span>
        </label>
        <span>Light</span>
      </div>
    </div>

    <div class="settings-group">
      <div style="font-size:13px;font-weight:600;margin-bottom:4px">Connection</div>
      <div>
        <label for="set-host">Adapter Host</label>
        <input id="set-host" type="text" placeholder="192.168.1.x"/>
      </div>
      <div>
        <label for="set-port">PWA Port</label>
        <input id="set-port" type="number" placeholder="8765"/>
      </div>
      <button id="settings-save" class="settings-save">Save</button>
    </div>

  </div><!-- /tab-settings -->

  <!-- ── Bottom tab bar ─────────────────────────────────────────────────── -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="main">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="4"/></svg>
      Main
    </button>
    <button class="tab-btn" data-tab="digits">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h4v4H3zm7 0h4v4h-4zm7 0h4v4h-4zM3 10h4v4H3zm7 0h4v4h-4zm7 0h4v4h-4zM3 17h4v4H3zm7 0h4v4h-4zm7 0h4v4h-4z"/></svg>
      Digits
    </button>
    <button class="tab-btn" data-tab="settings">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96a7.01 7.01 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.477.477 0 0 0-.59.22L2.74 8.87a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      Settings
    </button>
  </nav>

</div><!-- /app -->

<div id="toast"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
